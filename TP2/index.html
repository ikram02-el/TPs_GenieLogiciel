<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List — ENSA Béni Mellal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e8f0fa 0%, #f5f7fa 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 2.2rem;
      color: #1F5C99;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      color: #777;
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .app {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(31,92,153,0.10);
      padding: 28px;
      width: 100%;
      max-width: 600px;
    }

    /* ── FEATURE 1 : Ajouter une tâche ── */
    .add-section {
      border: 2px dashed #b3d0ee;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 24px;
      background: #f0f7ff;
    }

    .add-section label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #1F5C99;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #d0e4f7;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      background: white;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #1F5C99; }

    .btn-add {
      padding: 12px 22px;
      background: #1F5C99;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-add:hover { background: #174a7e; }
    .btn-add:active { transform: scale(0.97); }

    /* ── Stats ── */
    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat {
      flex: 1;
      text-align: center;
      background: #f8f9fa;
      border-radius: 10px;
      padding: 12px 8px;
      border: 1px solid #eee;
    }

    .stat .number { font-size: 1.6rem; font-weight: 700; color: #1F5C99; }
    .stat.done-stat .number { color: #2e7d32; }
    .stat.active-stat .number { color: #e65100; }
    .stat .label { font-size: 0.72rem; color: #999; margin-top: 2px; text-transform: uppercase; }

    /* ── Filtres ── */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .filter-btn {
      padding: 7px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      color: #666;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #1F5C99;
      border-color: #1F5C99;
      color: white;
    }

    /* ── Liste des tâches ── */
    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 60px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #fafafa;
      border: 1.5px solid #eee;
      border-radius: 10px;
      transition: all 0.25s;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .task-item:hover { border-color: #1F5C99; background: #f0f7ff; }

    /* ── FEATURE 3 : Marquer comme terminée ── */
    .task-item.completed {
      background: #f1faf1;
      border-color: #a5d6a7;
      opacity: 0.75;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #aaa;
    }

    /* ── Checkbox (Feature 3) ── */
    .task-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #2e7d32;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      font-size: 0.97rem;
      color: #333;
      word-break: break-word;
      line-height: 1.4;
    }

    /* ── FEATURE 2 : Supprimer une tâche ── */
    .btn-delete {
      background: none;
      border: 1.5px solid transparent;
      cursor: pointer;
      color: #ccc;
      font-size: 1rem;
      font-weight: 700;
      padding: 5px 8px;
      border-radius: 6px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: #c62828;
      border-color: #ffcdd2;
      background: #fff5f5;
    }

    .empty-msg {
      text-align: center;
      color: #ccc;
      padding: 32px 0;
      font-size: 0.95rem;
      font-style: italic;
    }

    /* ── Barre d'actions ── */
    .actions-bar {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .btn-clear {
      padding: 7px 16px;
      background: none;
      border: 1.5px solid #ffcdd2;
      border-radius: 8px;
      color: #c62828;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear:hover { background: #fff5f5; }

    footer {
      margin-top: 28px;
      font-size: 0.8rem;
      color: #bbb;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <header>
    <h1>✅ To-Do List</h1>
    <p>ENSA Béni Mellal — TP Génie Logiciel</p>
  </header>

  <div class="app">

    <!-- ══ FONCTIONNALITÉ 1 : Ajouter une tâche ══ -->
    <div class="add-section">
      <label>➕ Ajouter une tâche</label>
      <div class="input-row">
        <input
          type="text"
          id="taskInput"
          placeholder="Entrez votre tâche ici..."
          maxlength="120"
        />
        <button class="btn-add" onclick="addTask()">Ajouter</button>
      </div>
    </div>

    <!-- Statistiques -->
    <div class="stats">
      <div class="stat">
        <div class="number" id="totalCount">0</div>
        <div class="label">Total</div>
      </div>
      <div class="stat active-stat">
        <div class="number" id="activeCount">0</div>
        <div class="label">En cours</div>
      </div>
      <div class="stat done-stat">
        <div class="number" id="doneCount">0</div>
        <div class="label">Terminées</div>
      </div>
    </div>

    <!-- Filtres -->
    <div class="filters">
      <button class="filter-btn active" id="filter-all"    onclick="setFilter('all')">Toutes</button>
      <button class="filter-btn"        id="filter-active" onclick="setFilter('active')">En cours</button>
      <button class="filter-btn"        id="filter-done"   onclick="setFilter('done')">Terminées</button>
    </div>

    <!-- Liste -->
    <ul class="task-list" id="taskList"></ul>
    <p class="empty-msg" id="emptyMsg">Aucune tâche. Commencez par en ajouter une !</p>

    <!-- Bouton vider -->
    <div class="actions-bar">
      <button class="btn-clear" onclick="clearCompleted()">🗑 Supprimer les terminées</button>
    </div>

  </div>

  <footer>
    TP 2 — Intégration Notion &amp; Git<br>
    Pr. BE. ELBAGHAZAOUI — ENSA Béni Mellal 2025/2026
  </footer>

  <script>
    // ════════════════════════════════════════════════
    //  ÉTAT DE L'APPLICATION
    // ════════════════════════════════════════════════
    let tasks = [];
    let currentFilter = 'all';
    let nextId = 1;

    // ════════════════════════════════════════════════
    //  FONCTIONNALITÉ 1 : AJOUTER UNE TÂCHE
    //  Branch : feature/add-task
    // ════════════════════════════════════════════════
    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();

      if (!text) {
        input.style.borderColor = '#e53935';
        setTimeout(() => { input.style.borderColor = '#d0e4f7'; }, 1000);
        return;
      }

      const task = {
        id: nextId++,
        text: text,
        completed: false,
        createdAt: new Date().toLocaleString('fr-FR')
      };

      tasks.push(task);
      input.value = '';
      input.focus();
      render();
    }

    // ════════════════════════════════════════════════
    //  FONCTIONNALITÉ 2 : SUPPRIMER UNE TÂCHE
    //  Branch : feature/delete-task
    // ════════════════════════════════════════════════
    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function clearCompleted() {
      tasks = tasks.filter(t => !t.completed);
      render();
    }

    // ════════════════════════════════════════════════
    //  FONCTIONNALITÉ 3 : MARQUER COMME TERMINÉE
    //  Branch : feature/mark-done
    // ════════════════════════════════════════════════
    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.completed = !task.completed;
        render();
      }
    }

    // ════════════════════════════════════════════════
    //  FILTRE
    // ════════════════════════════════════════════════
    function setFilter(filter) {
      currentFilter = filter;
      ['all', 'active', 'done'].forEach(f => {
        document.getElementById('filter-' + f).classList.toggle('active', f === filter);
      });
      render();
    }

    // ════════════════════════════════════════════════
    //  RENDU DE LA LISTE
    // ════════════════════════════════════════════════
    function render() {
      const list     = document.getElementById('taskList');
      const emptyMsg = document.getElementById('emptyMsg');

      // Mise à jour des compteurs
      const total  = tasks.length;
      const done   = tasks.filter(t => t.completed).length;
      const active = total - done;

      document.getElementById('totalCount').textContent  = total;
      document.getElementById('activeCount').textContent = active;
      document.getElementById('doneCount').textContent   = done;

      // Filtrage
      const filtered = tasks.filter(t => {
        if (currentFilter === 'active') return !t.completed;
        if (currentFilter === 'done')   return  t.completed;
        return true;
      });

      // Affichage
      list.innerHTML = '';
      emptyMsg.style.display = filtered.length === 0 ? 'block' : 'none';

      filtered.forEach(task => {
        const li = document.createElement('li');
        li.className = 'task-item' + (task.completed ? ' completed' : '');
        li.title = 'Créée le : ' + task.createdAt;

        li.innerHTML =
          '<input type="checkbox" class="task-checkbox" ' +
            (task.completed ? 'checked' : '') +
            ' onchange="toggleTask(' + task.id + ')" ' +
            'title="Marquer comme ' + (task.completed ? 'en cours' : 'terminée') + '">' +
          '<span class="task-text">' + escapeHtml(task.text) + '</span>' +
          '<button class="btn-delete" onclick="deleteTask(' + task.id + ')" title="Supprimer cette tâche">✕</button>';

        list.appendChild(li);
      });
    }

    // ════════════════════════════════════════════════
    //  UTILITAIRE — Sécurité XSS
    // ════════════════════════════════════════════════
    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ════════════════════════════════════════════════
    //  RACCOURCI CLAVIER — Entrée pour ajouter
    // ════════════════════════════════════════════════
    document.getElementById('taskInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTask();
    });

    // Initialisation
    render();
  </script>

</body>
</html>
